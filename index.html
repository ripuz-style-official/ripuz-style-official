<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ripuz Official</title>

<!-- Tailwind (buton için gerekli) -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: url("background.jpg") no-repeat center center/cover;
}

/* karartma efekti */
.overlay {
  min-height: 100vh;
  background: rgba(0,0,0,0.7);

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* yazılar */
h1 {
  font-size: 50px;
  margin: 10px 0;
}

p {
  font-size: 20px;
  color: #ccc;
}

/* mobil uyum */
@media (max-width: 600px) {
  h1 { font-size: 32px; }
  p { font-size: 16px; }
}
</style>
</head>

<body>

<div class="overlay">

  <h1>Ripuz_KICK</h1>
  <h1>Official Website</h1>

  <p>Join my community & follow my content</p>

  <!-- BUTON -->
  <div class="mt-10">

    <a href="https://discord.gg/3xrjpVdrKt" target="_blank">

      <button
        class="group relative p-4 rounded-2xl backdrop-blur-xl border-2 border-indigo-500/30 bg-gradient-to-br from-indigo-900/40 via-black to-black/80 shadow-2xl hover:shadow-indigo-500/30 hover:scale-[1.05] hover:-translate-y-1 active:scale-95 transition-all duration-500 cursor-pointer overflow-hidden"
      >

        <!-- animasyon -->
        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-indigo-400/30 to-transparent -translate-x-full group-hover:translate-x-full transition duration-1000"></div>

        <div class="relative flex items-center gap-4">

          <!-- ikon -->
          <div class="p-3 rounded-lg bg-indigo-500/30">
            <svg xmlns="http://www.w3.org/2000/svg" fill="white" viewBox="0 0 24 24" width="24">
              <path d="M20.317 4.3698a19.79 19.79 0 0 0-4.8851-1.5152..."/>
            </svg>
          </div>

          <!-- yazı -->
          <div class="text-left">
            <div class="text-white font-semibold text-lg">Discord</div>
            <div class="text-gray-400 text-sm">Join Community</div>
          </div>

        </div>

      </button>

    </a>

  </div>

</div>

</body>
</html>
